<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Devang | Links</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Poppins',sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
overflow:hidden;
background:black;
}

/* 🎬 VIDEO BACKGROUND */
#bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* 🌫️ LIGHT OVERLAY */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.25);
z-index:-1;
}

/* container */
.container{
width:100%;
max-width:420px;
padding:25px;
text-align:center;
backdrop-filter:blur(20px);
border-radius:25px;
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 20px 60px rgba(0,0,0,0.6);
animation:fadeIn 1s ease;
}

/* profile */
.profile-pic{
width:110px;
height:110px;
border-radius:50%;
border:3px solid #22c55e;
margin-bottom:12px;
transition:.3s;
}
.profile-pic:hover{
transform:scale(1.08);
}

h1{
font-size:2rem;
font-weight:700;
}

p{
opacity:0.7;
margin-bottom:20px;
}

/* links */
.links{
display:flex;
flex-direction:column;
gap:12px;
}

.btn{
padding:14px 18px;
border-radius:14px;
background:rgba(255,255,255,0.08);
text-decoration:none;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
transition:.3s;
font-weight:500;
backdrop-filter:blur(10px);
}

.btn:hover{
transform:translateY(-4px) scale(1.02);
box-shadow:0 10px 25px rgba(0,0,0,0.6);
background:rgba(255,255,255,0.15);
}

.left{
display:flex;
align-items:center;
gap:10px;
}

.arrow{transition:.3s}
.btn:hover .arrow{transform:translateX(6px)}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px)}
to{opacity:1; transform:translateY(0)}
}

</style>
</head>

<body>

<!-- 🎬 VIDEO BACKGROUND -->
<video autoplay muted loop id="bg-video">
  <source src="bg.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">

<img src="pfp.jpg" class="profile-pic">

<h1>Devang</h1>
<p>Gamer 🎮</p>

<div class="links">

<a href="https://instagram.com/devang_ks" target="_blank" class="btn">
<div class="left"><i class="fa-brands fa-instagram"></i> Instagram</div>
<i class="fa-solid fa-arrow-right arrow"></i>
</a>

<a href="https://youtube.com/@devang_ks" target="_blank" class="btn">
<div class="left"><i class="fa-brands fa-youtube"></i> YouTube</div>
<i class="fa-solid fa-arrow-right arrow"></i>
</a>

<a href="https://open.spotify.com/user/313yqn4t66lnfcz5sosdmd36ktly" target="_blank" class="btn">
<div class="left"><i class="fa-brands fa-spotify"></i> Spotify</div>
<i class="fa-solid fa-arrow-right arrow"></i>
</a>

<a href="https://tracker.gg/valorant/profile/riot/devang%23meow/overview" target="_blank" class="btn">
<div class="left"><i class="fa-solid fa-gamepad"></i> Riot</div>
<i class="fa-solid fa-arrow-right arrow"></i>
</a>

<a href="https://t.me/devang_ks" target="_blank" class="btn">
<div class="left"><i class="fa-brands fa-telegram"></i> Telegram</div>
<i class="fa-solid fa-arrow-right arrow"></i>
</a>

<a href="https://wa.me/15094282645?text=Hey%20Devang" target="_blank" class="btn">
<div class="left"><i class="fa-brands fa-whatsapp"></i> WhatsApp</div>
<i class="fa-solid fa-arrow-right arrow"></i>
</a>

<a href="https://www.snapchat.com/add/devang_ks" target="_blank" class="btn">
<div class="left"><i class="fa-brands fa-snapchat"></i> Snapchat</div>
<i class="fa-solid fa-arrow-right arrow"></i>
</a>

</div>

</div>

</body>
</html>
